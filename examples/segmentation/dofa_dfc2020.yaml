# =============================================================================
# DOFA-Large (S2 optical, 13-band) on DFC2020
# Note: DOFA standalone as S2-only optical baseline.
# =============================================================================
seed_everything: 42

trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed
  logger:
    class_path: TensorBoardLogger
    init_args:
      save_dir: /home/clara/trans/tensorboard/dofa_dfc2020
      name: dofa_dfc2020
      version: v1
  callbacks:
    - class_path: RichProgressBar
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: epoch
    - class_path: EarlyStopping
      init_args:
        monitor: val/loss
        patience: 20
  max_epochs: 100
  check_val_every_n_epoch: 1
  log_every_n_steps: 10
  enable_checkpointing: false
  default_root_dir: /home/clara/trans/checkpoint/dofa_dfc2020

data:
  class_path: terratorch.datamodules.DFC2020DataModule
  init_args:
    data_root: /home/clara/trans/dfc2020/DFC2020
    batch_size: 4
    num_workers: 4
    image_size: 224
    single_modality: S2
    max_train_samples: 5000
    max_val_samples: 500

model:
  class_path: terratorch.tasks.SemanticSegmentationTask
  init_args:
    model_factory: EncoderDecoderFactory
    model_args:
      backbone: dofa_large_patch16_224
      backbone_pretrained: true
      backbone_model_bands:
        - COASTAL_AEROSOL
        - BLUE
        - GREEN
        - RED
        - RED_EDGE_1
        - RED_EDGE_2
        - RED_EDGE_3
        - NIR_BROAD
        - NIR_NARROW
        - WATER_VAPOR
        - CIRRUS
        - SWIR_1
        - SWIR_2

      necks:
        - name: SelectIndices
          indices: [5, 11, 17, 23]
        - name: ReshapeTokensToImage
          remove_cls_token: true
        - name: LearnedInterpolateToPyramidal

      decoder: UNetDecoder
      decoder_channels: [512, 256, 128, 64]
      head_dropout: 0.1
      num_classes: 8

    loss: dice
    ignore_index: -1
    freeze_backbone: false
    freeze_decoder: false
    plot_on_val: 0

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 6.0e-5
    weight_decay: 0.05

lr_scheduler:
  class_path: ReduceLROnPlateau
  init_args:
    monitor: val/loss
    patience: 6
    factor: 0.5
